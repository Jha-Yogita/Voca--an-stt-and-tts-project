<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="wrapper">
    <header>
      <div class="logo">⬡ VOCA</div>
      <div class="header-controls">
        <label class="toggle-wrap">
          <input type="checkbox" id="dark-toggle"/>
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
          <span class="toggle-label">Dark</span>
        </label>
        <select id="voice-select">
          <option value="">Auto Voice</option>
        </select>
        <button id="reset-btn" title="Reset conversation">↺ Reset</button>
      </div>
    </header>

    <main>
      <div class="chat-container" id="chat-window">
        <div id="message-list">
          <div class="welcome-msg">
            <span class="wm-icon">⬡</span>
            <p>Hello! I'm VOCA, your AI voice assistant.<br/>Type or speak to get started.</p>
          </div>
        </div>
        <div class="typing-indicator" id="bot-typing" style="display:none">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="input-bar">
        <div class="stt-status" id="stt-status"></div>
        <div class="input-row">
          <input
            type="text"
            id="message-input"
            placeholder="Ask me anything…"
            autocomplete="off"
          />
          <button id="mic-btn" class="icon-btn mic-btn" title="Hold to speak">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
            </svg>
          </button>
          <button id="send-btn" class="icon-btn send-btn" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Press <kbd>Enter</kbd> to send · Click mic to speak</div>
      </div>
    </main>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
